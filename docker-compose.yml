version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: id_card_app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=idcarddb
    volumes:
      - uploads_volume:/app/uploads
      - backups_volume:/app/backups
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: id_card_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=idcarddb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  uploads_volume:
  backups_volume:
